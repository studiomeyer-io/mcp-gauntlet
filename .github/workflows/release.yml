name: Release

# Publishes all three crates to crates.io on a v* tag, in dependency order.
# Requires the CARGO_REGISTRY_TOKEN secret.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features --workspace
      - name: Publish mcp-gauntlet-core
        run: cargo publish -p mcp-gauntlet-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish mcp-fuzz (retry until core is indexed)
        run: |
          for i in $(seq 1 20); do
            cargo publish -p mcp-fuzz --token ${{ secrets.CARGO_REGISTRY_TOKEN }} && exit 0
            echo "crates.io has not indexed mcp-gauntlet-core yet (attempt $i); retrying in 15s"
            sleep 15
          done
          echo "mcp-fuzz publish failed after retries"; exit 1
      - name: Publish mcp-storm (retry until core is indexed)
        run: |
          for i in $(seq 1 20); do
            cargo publish -p mcp-storm --token ${{ secrets.CARGO_REGISTRY_TOKEN }} && exit 0
            echo "crates.io has not indexed mcp-gauntlet-core yet (attempt $i); retrying in 15s"
            sleep 15
          done
          echo "mcp-storm publish failed after retries"; exit 1
